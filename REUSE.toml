# REUSE 設定：批次涵蓋無法掛 inline SPDX header 的 manifest / 設定 / 文件 / 測試入口檔。
# 已掛 header 的 .swift 原始碼不在此列；授權全文見 LICENSES/Apache-2.0.txt。
version = 1

[[annotations]]
path = [
	".gitattributes",
	".github/dependabot.yml",
	".gitignore",
	"NOTICE",
	"Package.swift",
	"README.md",
	"Tests/LinuxMain.swift",
	"docs/CODEOWNERS",
	"docs/SECURITY.md",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Unpxre (GitHub: UnpxreTW)"
SPDX-License-Identifier = "Apache-2.0"
